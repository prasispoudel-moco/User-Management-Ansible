- name: Configure sudo access
  ansible.builtin.user:
    name: "{{ item.0.username }}"
    groups: sudo
    append: true 
  loop: "{{ users | subelements('fleet') }}"
  when:
    - item.1.sudo | default(false) == 'true'

- name: Remove sudo access
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.0.username }}"
    state: absent
  loop: "{{ users | subelements('fleet') }}"
  when:
    - item.1.sudo | default(false) == 'false'
