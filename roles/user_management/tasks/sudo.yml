- name: Configure sudo access
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.0.username }}"
    content: "{{ item.0.username }} ALL=(ALL) NOPASSWD:ALL"
    owner: root
    group: root
    mode: '0440'
  loop: "{{ users | subelements('fleet') }}"
  when:
    - item.1.sudo | default(false)
    - item.0.state | default('present') == 'present'

- name: Remove sudo access when user is absent
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.username }}"
    state: absent
  loop: "{{ users }}"
  when:
    - item.state | default('present') == 'absent'
