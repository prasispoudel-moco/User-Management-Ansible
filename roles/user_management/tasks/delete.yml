- name: Show users scheduled for deletion
  ansible.builtin.debug:
    msg: "User '{{ item }}' will be deleted"
  loop: "{{ users_to_delete }}"
#  loop: "{{ lookup('vars', 'users_to_delete', wantlist=True) }}"
  when:
    - authoritative_user_management
    - users_to_delete is defined
    - users_to_delete | length > 0

