- name: Set global deletion approval
  ansible.builtin.set_fact:
    # We check if the input from Semaphore UI matches 'yes'
    deletion_approved: "{{ semaphore_confirm_delete | default('') | lower == 'yes' }}"
  run_once: true

#- name: Set global deletion approval
#  ansible.builtin.set_fact:
#    deletion_approved: "{{ deletion_confirmation.user_input | default('') | lower == 'yes' }}"
#  run_once: true

- name: Abort if not confirmed
  ansible.builtin.fail:
    msg: "User deletion aborted by operator"
  when:
    - authoritative_user_management
    - confirm_user_deletion
    - users_to_delete | length > 0
    - not ansible_check_mode
    - not deletion_approved
#    - deletion_confirmation.user_input | default('') | lower != 'yes'

- name: Delete unmanaged users
  ansible.builtin.user:
    name: "{{ item }}"
    state: absent
    remove: true
  loop: "{{ users_to_delete }}"
#  loop: "{{ lookup('vars', 'users_to_delete', wantlist=True) }}"
  when:
    - authoritative_user_management
    - deletion_approved
  notify: Remove sudo access for deleted users
